version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # major bump은 breaking change 위험 — minor/patch만 자동 PR.
    # major는 에코시스템 peer dep 호환 확인 후 수동 업그레이드.
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-plugin-jsx-a11y'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript-eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'vite'
        update-types: ['version-update:semver-major']
      - dependency-name: 'vitest'
        update-types: ['version-update:semver-major']
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']
    groups:
      tauri:
        patterns:
          - '@tauri-apps/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        # 그룹 레벨에서도 minor/patch만 묶음 — major가 그룹 전체를 망치는 것 방지
        update-types:
          - 'minor'
          - 'patch'
      dev-tooling:
        patterns:
          - 'eslint*'
          - 'prettier'
          - 'typescript*'
          - 'vite*'
          - 'vitest*'
          - '@vitejs/*'
          - '@testing-library/*'
          - 'husky'
          - 'lint-staged'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Rust 쪽도 major는 수동 — ts-rs 등 ABI 바뀌는 크레이트 많음
    ignore:
      - dependency-name: 'ts-rs'
        update-types: ['version-update:semver-major']
      - dependency-name: 'nix'
        update-types: ['version-update:semver-major']
    groups:
      tauri:
        patterns:
          - 'tauri*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
